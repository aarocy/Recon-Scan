services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    command: arq app.worker.WorkerSettings
